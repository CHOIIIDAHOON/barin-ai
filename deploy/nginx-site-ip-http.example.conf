# 테스트용: 도메인 없이 공인 IP만 — HTTP(80) → Uvicorn 127.0.0.1:8000
# 운영 전에 도메인 + HTTPS 로 교체 권장 (평문 HTTP).
#
# 앱 .env: USE_NGINX_CORS=true
# include 경로를 저장소 절대 경로로 수정 (예: /home/ubuntu/barin-ai)

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    include /home/ubuntu/barin-ai/deploy/nginx-snippet.conf;
}
