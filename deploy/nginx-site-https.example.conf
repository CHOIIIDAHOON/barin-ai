# 예시: Uvicorn은 127.0.0.1:8000 만 리슨, Nginx만 80/443 공개.
#
# 사용법:
#   1) api.example.com → 실제 도메인으로 바꿈
#   2) certbot 으로 인증서 발급 후 ssl_certificate 경로 확인
#   3) sudo cp 이 파일을 /etc/nginx/sites-available/barin-ai-api
#   4) sites-enabled 에 심볼릭 링크 후: sudo nginx -t && sudo systemctl reload nginx
#
# 앱 .env: USE_NGINX_CORS=true (CORS는 이 파일/스니펫이 담당)

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.example.com;

    # Let's Encrypt (certbot --nginx 로 발급한 경로)
    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # 없으면 이 줄 주석 처리 (일부 설치에는 ssl-dhparams.pem 이 없음)
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 앱 실제 경로로 수정 (예: /opt/chatbot-api 또는 /home/ubuntu/barin-ai)
    include /opt/chatbot-api/deploy/nginx-snippet.conf;
}
