# 예시: Uvicorn은 127.0.0.1:8000 만 리슨, Nginx만 80/443 공개.
#
# 사용법:
#   1) api.example.com → 실제 도메인으로 바꿈
#   2) certbot 으로 인증서 발급 후 fullchain.pem / privkey.pem 경로 확인
#   3) include 줄을 저장소 절대 경로로 수정
#   4) 인증서 없이 먼저 띄우려면 deploy/nginx-site-http.example.conf 사용
#
# 앱 .env: USE_NGINX_CORS=true
#
# 참고: /etc/letsencrypt/options-ssl-nginx.conf 는 certbot 실행 후에 생기는 경우가 많아
#       여기서는 의존하지 않고 아래 최소 TLS 설정만 씁니다.

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.example.com;

    # Let's Encrypt (certbot --nginx 로 발급한 경로)
    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # 앱 실제 경로로 수정 (예: /opt/chatbot-api 또는 /home/ubuntu/barin-ai)
    include /opt/chatbot-api/deploy/nginx-snippet.conf;
}
