# TLS 없이 80만 — 인증서 발급 전에 쓰기 / 내부 테스트용.
# Certbot 후에는 nginx-site-https.example.conf 로 바꾸거나 443 블록을 추가하세요.
#
# 앱 .env: USE_NGINX_CORS=true
# include 경로를 서버上的 저장소 절대 경로로 수정

server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;

    include /home/ubuntu/barin-ai/deploy/nginx-snippet.conf;
}
