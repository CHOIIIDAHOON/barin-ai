# server { ... } 안에 넣기. Uvicorn은 127.0.0.1:8000.
#
# Flutter 웹에서 "Failed to fetch" → 브라우저 CORS. 아래를 쓰면:
#   서버 .env 에 USE_NGINX_CORS=true  (앱은 CORSMiddleware 안 씀, 헤더 이중 방지)
# Nginx 없이 Uvicorn만 쓰면 USE_NGINX_CORS=false + CORS_ALLOW_ALL 또는 CORS_ALLOW_ORIGINS

location /chat {
    # 브라우저 preflight (OPTIONS)
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Max-Age 86400 always;
        return 204;
    }

    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # 실제 POST 응답에도 CORS (프록시 응답에 붙이려면 always)
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
}

location /health {
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept" always;
        return 204;
    }
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    add_header Access-Control-Allow-Origin * always;
}
